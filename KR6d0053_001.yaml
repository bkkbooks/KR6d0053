body:
  text: 第一卷科釋疏二初釋題目二初正釋題二說記人二釋疏文二初豫分章段二初敘二家三段二今師下示天台多種二初明多種分文二若作下正依三段節目二就前下正釋經文三初前問答二初分科二一爾下隨釋二初問四初時節二初釋字義二即是下明悉檀二初別釋相四初世界二或可下為人三或可下對治四或可下第一義二諸佛下總明悉二標人二初釋別名三初中道對小二又云下三諦明圓二初總示二大品下別示三初圓空無盡二又大下圓假無盡二初引經示相三初大集約八十明假二初本土所修二身子下依法立字二初身子問二菩薩答二又淨下淨名就二諦明假三華嚴約十藏明假二如此下結經明假三又如下圓中無盡二初引經示相四初勝鬘約佛法明中二大品約法界明中三淨名示即邊是中四大品明諸法皆中二如此下結經明中三通達下從德立名二初正立名二亦名下例諸法二菩薩下釋通名三初對梵翻名二約華釋義二初釋衆生二初通明因果二別明菩薩二發心下釋餘字三廣釋如別三敬儀二初分經二起者下隨釋三初釋起二初事釋二觀釋三初約空論起二又菩下約假論起三又中下約中論起二偏袒下釋袒二初事釋二初約西土二此方下約此方二觀釋三釋合掌二初釋合掌二初事釋二觀解二初表權實二又五下表事理二釋向佛四正發問二初分文立意三初帶總分節二大經下問答功德三釋論下簡示今問二世尊下依文釋義三初釋稱歎二觀世下釋所問三何因下釋正問二初問能成因緣二初別取境智二若就下互通凡聖二名觀下問所成名號二佛答二後問答三聞品功德二佛答二初分科二數者下隨釋三初總答二初貼文二初明機四初標人數二初舉多數三初牒經略示二如一下同受一苦三將此下以例諸趣二所以下明多意二遭苦二初成上義顯無量二初以別業該同受二用此下以此意歷十界二今言下對別答彰偏該二初明總答二後別答三聞名二初遭苦聞名共作機二聞有下四聞三慧俱能感二初釋相二初別指四教四聞二若能下正示圓教三慧二此文下結示四稱號二初牒示事理二若用下各示稱念二初事二初明一心二明稱名二理二初明一心二知聲下明稱名二明應二初分科二應有下隨釋二初明應相二初明偏圓益相二衆機下明機應速相二皆得下明解脫二初約多機顯圓應二或時下約三速再貼文二問十下料簡二初明十界機應俱時遍二初以多機差別難二答譬下四事圓普答五初以四喻示二菩薩下約四法合三安樂下引此經證四又如下又三喻顯五又是下示三昧力二問一下一心事理立能感二初久稱無效問二散心乖法答二別答三勸持第二別答二初分科敘意二初分科二敘意二初敘他師意三初立三機三初有人下定三業前後二通論下論三機與拔三敘三番料簡三初問答二問答三問答二有人下立七難二初明雙隻二明次第三有師下立八難二初一師立二一師破二今明下明今師意二初明三機二初斥他非二初斥情下聖應二今不下斥悲門與樂二今言下明今意二初隨世立次二若尋下聖應無謀二他既下明七難二初明次第二初且一往立次二至如下誡不可定執二問諸下明所表二初以難多唯七責二答此下以七難表六答二初正示表意二初通明七六二云何下別示空識二初明表相二空為下明為難二初空二識二所以下結示唯七意二依義釋文二一火下依義釋文三初口機二初明七難七初火難二初科意三初節經文二上總下敘經意三釋諸下列義門二貼文下隨釋三初貼文四初持名二初釋文義二初釋持名二釋若有二餘皆下明前後二初敘古二今釋三初約義釋二如慈下引事勸二初引事證二行人下勸憶持三火難下約重結二遭苦設入大火三應火不能燒四威神下結二次約下舉事二初示二人著傳二其傳下舉四人免難三就觀下觀釋三初通標列二果報下示分劑三果報火難下隨次釋三初果報火二初遭難三初通明處二如阿下別示相三凡一下總結數二持是下感應二初機成獲脫二直就下指數斥局二次明下惡業火二初遭難二初明修因二多為下明遭火三初釋相二術婆下引證二初引事二金光下引經三能破下被燒二若能下感應三初成機得脫二故請下引消伏證三由斯下用此文結三煩惱火二初就機應解釋二初明偏圓機感二初別釋二初約聲聞廣示二次明下例餘位俱機二凡有下總示二初修觀被燒二稱觀下稱名得脫二問菩下明漸頓慈悲二初問起二答菩下釋出二初略示二所以下廣釋二初明漸次二初修觀本誓三初果報慈悲二受持下修因慈悲三修無下無漏慈悲二初事定二又觀下三觀二今住下熏心起應二初乘誓赴難三初真悲妙力二若事下衆機關誓三若衆下一時普救二如華下引經證成二初引經二舉彼下結示二次明下圓頓二初明本修圓觀慈悲二若法下明入位法界機應二初釋三初無謀而應二雖無下不分而分三雖應下入而不入二菩薩下結二常途下示己他得失二水難三羅剎難四刀杖難五鬼難六枷鎖難七怨賊難二二意機三身機二水難二初列義門二貼文下隨門釋三初貼文二初科經二問何下釋義三初遭水二初問二答二初就水難答二火難下對火難答二稱名三水難下蒙應二引證三觀釋二初列三水二如地下釋三水三初果報二初遭難二是時下機應二次惡下惡業二初遭難二若能下機應三煩惱二初明機二初論惑水二初通明諸有水二二乘下別示四教機二初示聲聞二次支下例諸位二復次下示四流二菩薩下明應二初通示二觀慈悲二所以下別明三昧漸頓二初漸二初漸修二今成下頓應二初乘誓赴難二如華下引經證成二初